name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check src/ tests/

      - name: Build index (local-tfidf, offline)
        run: python -m src.ingest.build_index
        env:
          EMBEDDING_PROVIDER: local-tfidf

      - name: Run tests (mock LLM provider -- no API key needed)
        run: pytest tests/ -v
        env:
          LLM_PROVIDER: mock
          EMBEDDING_PROVIDER: local-tfidf

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t research-assistant:ci .

  ragas-eval-gate:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.repository == github.event.pull_request.base.repo.full_name || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build index
        run: python -m src.ingest.build_index
        env:
          EMBEDDING_PROVIDER: local-tfidf
      - name: Run RAGAS evaluation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_PROVIDER: anthropic
          EMBEDDING_PROVIDER: local-tfidf
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "No ANTHROPIC_API_KEY secret configured -- skipping RAGAS quality gate."
            exit 0
          fi
          python eval/run_ragas.py --fail-under 0.7
